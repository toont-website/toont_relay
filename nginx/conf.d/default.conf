    resolver 127.0.0.11 valid=10s;

  # HTTP → HTTPS 리다이렉트
  server {
      listen 80;
      server_name relay.toont.co.kr;

      location /.well-known/acme-challenge/ {
          root /var/www/certbot;
      }

      location / {
          return 301 https://$host$request_uri;
      }
  }

  # HTTPS
  server {
      listen 443 ssl;
      server_name relay.toont.co.kr;

      ssl_certificate /etc/letsencrypt/live/relay.toont.co.kr/fullchain.pem;
      ssl_certificate_key /etc/letsencrypt/live/relay.toont.co.kr/privkey.pem;

      location /api/webhook/sms {
          allow 172.16.0.0/12;
          allow 192.168.0.0/16;
          allow 10.0.0.0/8;
          deny all;
          set $app_upstream http://app:3000;
          proxy_pass $app_upstream;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
      }

      location /api/sms/ {
          limit_req zone=sms_send burst=5 nodelay;
          limit_req_status 429;
          set $app_upstream http://app:3000;
          proxy_pass $app_upstream;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
      }

      location /api/ {
          set $app_upstream http://app:3000;
          proxy_pass $app_upstream;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
      }

      location /sms-gateway/ {
          proxy_pass http://sms-backend:3080/;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
      }

      location / {
          set $app_upstream http://app:3000;
          proxy_pass $app_upstream;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
      }
  }

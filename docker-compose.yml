services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "3000"
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  sms-backend:
    image: ghcr.io/android-sms-gateway/server:latest
    expose:
      - "3080"
    environment:
      - CONFIG_PATH=config.yml
      - DATABASE__PASSWORD=smsgateway_password
      - GATEWAY__PRIVATE_TOKEN=${ASG_GATEWAY_PRIVATE_TOKEN}
    configs:
      - source: sms-config
        target: /app/config.yml
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - internal

  sms-worker:
    image: ghcr.io/android-sms-gateway/server:latest
    command: ["/app/app", "worker"]
    environment:
      - CONFIG_PATH=config.yml
      - DATABASE__PASSWORD=smsgateway_password
    configs:
      - source: sms-config
        target: /app/config.yml
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - internal

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: sms_gateway
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    expose:
      - "3306"
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
      - sms-backend
    networks:
      - internal
    restart: unless-stopped

configs:
  sms-config:
    content: |
      gateway:
        mode: private
        webhooks:
          - url: http://app:3000/api/webhook/sms
            event: sms:received
      http:
        listen: 0.0.0.0:3080
      database:
        host: mysql
        port: 3306
        user: smsgateway
        password: smsgateway_password
        database: sms_gateway
      fcm:
        credentials_json: "{}"
        timeout_seconds: 1
        debounce_seconds: 5

volumes:
  mysql_data:
  sms_gateway_data:
  certbot_webroot:
  certbot_certs:

networks:
  internal:
    driver: bridge

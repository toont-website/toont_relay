services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "3000"
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  sms-gateway:
    image: capcom6/sms-gateway:latest
    expose:
      - "3080"
    environment:
      ASG_GATEWAY_PRIVATE_TOKEN: ${ASG_GATEWAY_PRIVATE_TOKEN}
      ASG_DATABASE_DSN: smsgateway:smsgateway_password@tcp(mysql:3306)/sms_gateway?charset=utf8mb4&parseTime=True&loc=Local
      ASG_GATEWAY_WEBHOOKS_0_URL: http://app:3000/api/webhook/sms
      ASG_GATEWAY_WEBHOOKS_0_EVENT: sms:received
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: sms_gateway
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    expose:
      - "3306"
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_webroot:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - app
      - sms-gateway
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mysql_data:
  certbot_webroot:
  certbot_certs:

networks:
  internal:
    driver: bridge
